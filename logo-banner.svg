<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f1e"/>
      <stop offset="100%" style="stop-color:#0f3330"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="32" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <line x1="0" y1="133" x2="1200" y2="133" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
  <line x1="0" y1="266" x2="1200" y2="266" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
  <line x1="600" y1="0" x2="600" y2="400" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
  <line x1="900" y1="0" x2="900" y2="400" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>

  <!-- Hexagon icon -->
  <polygon points="170,100 234,100 266,157 234,214 170,214 138,157"
    fill="#134e4a" stroke="#2dd4bf" stroke-width="2.5"/>
  <!-- C arc -->
  <path d="M238,133 A48,48 0 1,0 238,181" fill="none" stroke="url(#cGrad)" stroke-width="14" stroke-linecap="round"/>
  <!-- Arrow -->
  <line x1="234" y1="136" x2="262" y2="108" stroke="#f0fdfa" stroke-width="8" stroke-linecap="round"/>
  <line x1="262" y1="108" x2="232" y2="104" stroke="#f0fdfa" stroke-width="7" stroke-linecap="round"/>
  <line x1="262" y1="108" x2="266" y2="138" stroke="#f0fdfa" stroke-width="7" stroke-linecap="round"/>
  <!-- Dots -->
  <circle cx="236" cy="204" r="7" fill="#2dd4bf"/>
  <circle cx="252" cy="192" r="4.5" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="264" cy="176" r="3" fill="#2dd4bf" opacity="0.35"/>

  <!-- Wordmark Career -->
  <text x="310" y="182" font-family="Georgia, serif" font-size="88" font-weight="700"
    fill="#e2faf7" letter-spacing="-2">Career</text>
  <!-- PK accent -->
  <text x="810" y="182" font-family="Georgia, serif" font-size="88" font-weight="700"
    fill="#2dd4bf" letter-spacing="-2">PK</text>

  <!-- Divider line -->
  <line x1="310" y1="200" x2="960" y2="200" stroke="#2dd4bf" stroke-width="1.5" opacity="0.3"/>

  <!-- Tagline -->
  <text x="310" y="232" font-family="Arial, sans-serif" font-size="22" font-weight="400"
    fill="#7ecec7" letter-spacing="5">OPPORTUNITIES  ·  GROWTH  ·  FUTURE</text>

  <!-- Pakistan badge -->
  <rect x="756" y="256" width="200" height="38" rx="19" fill="#0d9488"/>
  <text x="856" y="281" font-family="Arial, sans-serif" font-size="16" font-weight="600"
    fill="#f0fdfb" letter-spacing="3" text-anchor="middle">PAKISTAN</text>
</svg>
