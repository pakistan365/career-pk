services:
  - type: web
    name: careerhub-pakistan
    env: node
    plan: free
    buildCommand: ""
    startCommand: npm start
    autoDeploy: true
    headers:
      - path: /api/*
        name: Access-Control-Allow-Origin
        value: "*"
      - path: /api/*
        name: Cache-Control
        value: no-store, max-age=0
      - path: /*.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /css/*
        name: Cache-Control
        value: no-cache, max-age=0, must-revalidate
      - path: /js/*
        name: Cache-Control
        value: no-cache, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /scholarships
        destination: /scholarships.html
      - type: rewrite
        source: /scholarships-national
        destination: /scholarships-national.html
      - type: rewrite
        source: /scholarships-international
        destination: /scholarships-international.html
      - type: rewrite
        source: /jobs
        destination: /jobs.html
      - type: rewrite
        source: /jobs-government
        destination: /jobs-government.html
      - type: rewrite
        source: /jobs-private
        destination: /jobs-private.html
      - type: rewrite
        source: /internships
        destination: /internships.html
      - type: rewrite
        source: /exams
        destination: /exams.html
      - type: rewrite
        source: /exams-mdcat
        destination: /exams-mdcat.html
      - type: rewrite
        source: /exams-css
        destination: /exams-css.html
      - type: rewrite
        source: /exams-ppsc
        destination: /exams-ppsc.html
      - type: rewrite
        source: /books
        destination: /books.html
      - type: rewrite
        source: /search
        destination: /search.html
      - type: rewrite
        source: /favorites
        destination: /favorites.html
      - type: rewrite
        source: /resume-builder
        destination: /resume-builder.html
      - type: rewrite
        source: /about
        destination: /about.html
      - type: rewrite
        source: /contact
        destination: /contact.html
      - type: rewrite
        source: /terms
        destination: /terms.html
      - type: rewrite
        source: /privacy
        destination: /privacy.html
      - type: rewrite
        source: /opportunity
        destination: /opportunity.html
