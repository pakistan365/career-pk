<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Contact — Career Pakistan</title>
<link rel="icon" href="logo.png"><link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<section class="section"><div class="container"><div class="content-card">
<h1>Contact Us</h1><p>Send your feedback, report data issues, or suggest listings.</p>
<form id="contactForm" class="contact-form" novalidate>
  <label>Name<input type="text" id="contactName" required minlength="2"></label>
  <label>Email<input type="email" id="contactEmail" required></label>
  <label>Message<textarea id="contactMessage" rows="6" required minlength="10"></textarea></label>
  <p id="contactError" style="display:none;color:#b91c1c;margin:8px 0;">Please complete all fields with valid details.</p>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn btn-primary" type="submit">Send Message</button>
    <a class="btn btn-secondary" href="mailto:support@careerhub.pk">Use Email App</a>
  </div>
</form>
</div></div></section>
<script>
document.getElementById('contactForm')?.addEventListener('submit', function (e) {
  e.preventDefault();
  const name = document.getElementById('contactName').value.trim();
  const email = document.getElementById('contactEmail').value.trim();
  const message = document.getElementById('contactMessage').value.trim();
  const validEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  const error = document.getElementById('contactError');
  if (name.length < 2 || !validEmail || message.length < 10) {
    error.style.display = 'block';
    return;
  }
  error.style.display = 'none';
  const subject = encodeURIComponent('Career Pakistan Contact Form');
  const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${message}`);
  window.location.href = `mailto:support@careerhub.pk?subject=${subject}&body=${body}`;
});
</script>
<script src="js/google-sheet-loader.js"></script><script src="js/app.js"></script><script src="js/comprehensive-fix.js"></script>
</body></html>
