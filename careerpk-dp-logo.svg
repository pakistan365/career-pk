<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bgDP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f1e"/>
      <stop offset="100%" style="stop-color:#0f3330"/>
    </linearGradient>
    <linearGradient id="cDP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="800" height="800" rx="160"/>
    </clipPath>
  </defs>

  <!-- Outer bg -->
  <rect width="800" height="800" rx="160" fill="url(#bgDP)"/>
  <!-- Subtle rings -->
  <circle cx="400" cy="370" r="290" fill="none" stroke="#2dd4bf" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="370" r="260" fill="none" stroke="#2dd4bf" stroke-width="0.8" opacity="0.1"/>
  <!-- Inner dark disc -->
  <circle cx="400" cy="370" r="280" fill="#134e4a" opacity="0.6"/>

  <!-- C arc — large, centred -->
  <path d="M498,215 A155,155 0 1,0 498,525" fill="none" stroke="url(#cDP)"
    stroke-width="38" stroke-linecap="round"/>

  <!-- Arrow — top right burst -->
  <line x1="492" y1="222" x2="556" y2="152" stroke="#f0fdfa" stroke-width="26" stroke-linecap="round"/>
  <line x1="556" y1="152" x2="484" y2="146" stroke="#f0fdfa" stroke-width="20" stroke-linecap="round"/>
  <line x1="556" y1="152" x2="562" y2="224" stroke="#f0fdfa" stroke-width="20" stroke-linecap="round"/>

  <!-- Career path dots -->
  <circle cx="516" cy="506" r="14" fill="#2dd4bf"/>
  <circle cx="544" cy="476" r="9" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="562" cy="442" r="6" fill="#2dd4bf" opacity="0.35"/>

  <!-- CAREER label -->
  <text x="400" y="590" font-family="Arial, sans-serif" font-size="38" font-weight="400"
    fill="#e2faf7" letter-spacing="10" text-anchor="middle" opacity="0.85">CAREER</text>

  <!-- PK bold -->
  <text x="400" y="658" font-family="Arial Black, sans-serif" font-size="72" font-weight="900"
    fill="#2dd4bf" letter-spacing="10" text-anchor="middle">PK</text>

  <!-- Bottom teal bar -->
  <rect x="0" y="724" width="800" height="76" fill="#0d9488" clip-path="url(#roundClip)"/>
  <text x="400" y="772" font-family="Arial, sans-serif" font-size="22" font-weight="500"
    fill="#f0fdfb" letter-spacing="6" text-anchor="middle">CAREERPK.COM</text>
</svg>