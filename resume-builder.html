<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Create a clean and ATS-friendly resume with CareerHub Pakistan's free resume builder."/>
<meta name="robots" content="index, follow, max-image-preview:large"/>
<meta property="og:image" content="https://careerhub.pk/logo-banner.svg"/>
<meta name="twitter:image" content="https://careerhub.pk/logo-banner.svg"/>
<title>Resume Builder | CareerHub Pakistan</title>
<link rel="canonical" href="https://careerhub.pk/resume-builder.html"/>
<link rel="icon" href="logo.svg" type="image/svg+xml"/>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="js/seo.js" defer></script>
</head>
<body>
<nav class="navbar" id="navbar"><div class="nav-container"><a href="index.html" class="nav-logo"><img src="logo.svg" alt="CareerPK" height="44"/></a><ul class="nav-links" id="navLinks"><li><a href="index.html">Home</a></li><li><a href="jobs.html">Jobs</a></li><li><a href="resume-builder.html" class="active">Resume Builder</a></li></ul></div></nav>
<div class="page-header"><div class="container"><h1 class="page-title">🧾 Resume Builder</h1><p class="page-subtitle">Create a quick, ATS-friendly resume and print as PDF.</p></div></div>
<section class="section"><div class="container"><form id="resumeForm" class="contact-form"><input id="name" placeholder="Full Name" required/><input id="email" placeholder="Email" required/><input id="title" placeholder="Professional Title"/><textarea id="summary" placeholder="Professional Summary"></textarea><button class="btn btn-primary" type="button" onclick="generateResume()">Generate Resume</button></form><div id="resumeOutput" style="margin-top:20px"></div></div></section>
<script>
function generateResume(){const n=document.getElementById('name').value;const e=document.getElementById('email').value;const t=document.getElementById('title').value;const s=document.getElementById('summary').value;document.getElementById('resumeOutput').innerHTML=`<div class="card visible"><div class="card-body"><h2>${n}</h2><p><strong>${t}</strong></p><p>${e}</p><p>${s}</p></div></div>`;}
</script>
</body>
</html>
