<!-- Career Pakistan Logo SVG -->
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient -->
  <defs>
    <linearGradient id="cpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38f1d7"/>
      <stop offset="100%" stop-color="#0ea5a4"/>
    </linearGradient>
  </defs>

  <!-- Letter C -->
  <path d="
    M150 60
    A90 90 0 1 0 150 240
    L150 200
    A50 50 0 1 1 150 100
    Z
  " fill="url(#cpGradient)"/>

  <!-- Letter P -->
  <path d="
    M150 110
    L150 240
    L180 240
    L180 170
    A40 40 0 1 0 150 110
    Z
  " fill="url(#cpGradient)"/>

  <!-- Arrow -->
  <line x1="120" y1="140" x2="230" y2="60"
        stroke="#ffffff"
        stroke-width="10"
        stroke-linecap="round"/>

  <!-- Arrow Head -->
  <polygon points="230,60 210,65 220,80" fill="#ffffff"/>

  <!-- Star -->
  <polygon points="250,50 255,60 265,60 257,67 260,78 250,72 240,78 243,67 235,60 245,60"
           fill="#38f1d7"/>

</svg>
