<!-- Career Pakistan logo (vector recreation from provided mark) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Career Pakistan logo</title>
  <desc id="desc">Stylized CP monogram with upward arrow and sparkle in aqua gradient.</desc>
  <defs>
    <linearGradient id="cpMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8ef5ea"/>
      <stop offset="0.55" stop-color="#2ec7d6"/>
      <stop offset="1" stop-color="#036374"/>
    </linearGradient>
    <linearGradient id="cpArrow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a6fff3"/>
      <stop offset="1" stop-color="#0c7d90"/>
    </linearGradient>
  </defs>

    <!-- C ring -->
  <path d="M520 250c-182 0-330 148-330 330s148 330 330 330h140v-88H520c-133 0-242-109-242-242s109-242 242-242c57 0 108 19 150 51l63-63c-58-49-132-76-213-76z" fill="url(#cpMain)"/>
  
  <!-- P bowl -->
  <path d="M705 505h176c139 0 251 112 251 250S1020 1005 881 1005H705v-88h176c90 0 163-72 163-162 0-89-73-162-163-162H705v-88z" fill="url(#cpMain)"/>

  <!-- P stem -->
  <rect x="610" y="505" width="95" height="600" rx="46" fill="url(#cpMain)"/>

  <!-- Rising arrow shaft -->
  <path d="M510 705l95 95 357-357-95-95z" fill="url(#cpArrow)"/>

  <!-- Arrow head -->
  <path d="M883 414l181-39-39 181-48-48-357 357-55-55 357-357z" fill="url(#cpArrow)"/>

  <!-- Sparkle -->
  <path d="M1090 286c-32 0-58-26-58-58 0 32-26 58-58 58 32 0 58 26 58 58 0-32 26-58 58-58z" fill="#79efe6"/>

</svg>
