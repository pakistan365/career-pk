<!-- Career Pakistan Logo (Optimized SVG) -->
<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient -->
  <defs>
    <linearGradient id="cpGradient" x1="0" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38f1d7"/>
      <stop offset="1" stop-color="#0ea5a4"/>
    </linearGradient>
  </defs>

  <!-- C Shape -->
  <path
    d="M150 50
       A100 100 0 1 0 150 250
       A65 65 0 1 1 150 115"
    stroke="url(#cpGradient)"
    stroke-width="28"
    stroke-linecap="round"
    fill="none"/>

  <!-- P Stem -->
  <rect x="150" y="110" width="26" height="130" rx="13" fill="url(#cpGradient)"/>

  <!-- P Curve -->
  <path
    d="M150 110
       A45 45 0 1 1 150 200"
    stroke="url(#cpGradient)"
    stroke-width="26"
    stroke-linecap="round"
    fill="none"/>

  <!-- Arrow Line -->
  <line x1="120" y1="140" x2="235" y2="60"
        stroke="#ffffff"
        stroke-width="10"
        stroke-linecap="round"/>

  <!-- Arrow Head -->
  <polygon points="235,60 215,65 225,80" fill="#ffffff"/>

  <!-- Star -->
  <polygon
    points="255,45 260,55 272,55 262,63 266,75 255,68 244,75 248,63 238,55 250,55"
    fill="#38f1d7"/>

</svg>
