<script>
let allData=[];
document.addEventListener('DOMContentLoaded',()=>{updateFavCount();onCMSReady(()=>{loadData();updateFavCount();});registerAutoRefreshSection('Exams',loadData);initializeAutoRefreshListeners();});
function loadData(){const rows=window.CMS_DATA.Exams||[];allData=rows.filter(e=>includesFilterValue(e.exam_type,'ppsc')||includesFilterValue(e.title,'ppsc'));applyFilters();}
function applyFilters(){renderCards(sortItems(allData,'newest'),'resultsGrid','exam');document.getElementById('resultsCount').textContent=`${allData.length} PPSC exam${allData.length!==1?'s':''} found`;document.getElementById('emptyState').style.display=allData.length===0?'flex':'none';}
</script>
