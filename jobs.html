</div><div class="nav-search" id="navSearch"><div class="nav-container"><form action="search.html" method="GET" class="search-form-nav"><i class="fa fa-search"></i><input type="text" name="q" id="navSearchInput" placeholder="Search books..."/><button type="submit">Search</button></form></div></div></nav>
<div class="page-header"><div class="container"><h1 class="page-title">📚 Books & Study Material</h1><p class="page-subtitle">Exam prep books and free PDFs</p></div></div>
<div class="filter-bar"><div class="container"><div class="filter-row"><div class="filter-left">
<select class="filter-select" id="filterExam" onchange="applyFilters()"><option value="">📝 All Exams</option><option value="MDCAT">MDCAT</option><option value="CSS">CSS</option><option value="PPSC">PPSC</option><option value="FPSC">FPSC</option><option value="IELTS">IELTS</option></select>
<select class="filter-select" id="filterCategory" onchange="applyFilters()"><option value="">📂 All Categories</option><option value="Preparation">Preparation</option><option value="Past Papers">Past Papers</option><option value="Guide">Guide</option></select>
<select class="filter-select" id="filterFree" onchange="applyFilters()"><option value="">💳 Free + Paid</option><option value="free">Free only</option><option value="paid">Paid only</option></select>
<button class="btn-clear" onclick="clearFilters()"><i class="fa fa-times"></i> Clear</button>
</div><div class="filter-right"><label class="filter-label">Sort:</label><select class="filter-select" id="sortBy" onchange="applyFilters()"><option value="newest">Newest</option><option value="oldest">Oldest</option></select></div></div></div></div>
<section class="section"><div class="container"><div class="results-info"><span id="resultsCount">Loading...</span></div><div class="cards-grid" id="resultsGrid"><div class="skeleton-card"></div></div><div class="empty-state" id="emptyState" style="display:none"><i class="fa fa-inbox"></i><h3>No books found</h3></div></div></section>
<script src="js/google-sheet-loader.js"></script><script src="js/app.js"></script><script src="js/cms-auto-refresh-listener.js"></script><script src="js/chatbot-loader.js"></script>
<script>
let allData=[];
document.addEventListener('DOMContentLoaded',()=>{updateFavCount();onCMSReady(()=>{loadData();updateFavCount();});registerAutoRefreshSection('Books',loadData);initializeAutoRefreshListeners();});
function loadData(){allData=window.CMS_DATA.Books||[];applyFilters();}
function applyFilters(){const exam=document.getElementById('filterExam').value;const cat=document.getElementById('filterCategory').value;const free=document.getElementById('filterFree').value;const sort=document.getElementById('sortBy').value;let f=allData.filter(b=>(!exam||(b.exam_type||'').includes(exam))&&(!cat||b.category===cat)&&(!free||(free==='free'?b.is_free:!b.is_free)));f=sortItems(f,sort);document.getElementById('resultsCount').textContent=`${f.length} book${f.length!==1?'s':''} found`;renderCards(f,'resultsGrid','book');document.getElementById('emptyState').style.display=f.length===0?'flex':'none';}
function clearFilters(){['filterExam','filterCategory','filterFree'].forEach(id=>document.getElementById(id).value='');document.getElementById('sortBy').value='newest';applyFilters();}
</script>
